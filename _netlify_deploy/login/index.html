<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eventify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Left Side -->
        <div class="hero-section">
            <div class="hero-overlay"></div>

            <div class="hero-logo">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="4" width="18" height="18" rx="4" fill="#7f0df2" opacity="0.15" />
                        <path d="M8 2v4M16 2v4M3 10h18" stroke="#7f0df2" stroke-width="2" stroke-linecap="round" />
                        <circle cx="8" cy="15" r="1.5" fill="#7f0df2" />
                        <circle cx="12" cy="15" r="1.5" fill="#7f0df2" />
                        <circle cx="16" cy="15" r="1.5" fill="#7f0df2" />
                    </svg>
                </div>
                <div class="logo-text">Eventify</div>
            </div>

            <div class="hero-content">
                <h2 class="hero-quote">"Welcome back!<br>Ready for your next adventure?"</h2>
            </div>

            <div></div> <!-- Spacer -->
        </div>

        <!-- Right Side -->
        <div class="form-section">
            <div class="form-container">
                <div class="form-header">
                    <h1>Welcome Back</h1>
                    <p>Sign in to your Eventify account.</p>
                </div>

                <div id="errorMessage"
                    style="display:none; background:#fee2e2; color:#b91c1c; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:14px; font-weight:500;">
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="loginEmail" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label class="form-label">Password</label>
                            <a href="#" class="forgot-link" onclick="showForgot(event)">Forgot Password?</a>
                        </div>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="password" placeholder="********" required>
                            <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">Login</button>
                </form>

                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Official Google Sign-In Button Container -->
                <div id="googleBtnContainer" style="display: flex; justify-content: center; width: 100%; margin-top: 10px;"></div>

                <div class="register-link">
                    Don't have an account? <a href="../signup/index.html">Register</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // Google Client ID — must match the GOOGLE_CLIENT_ID in backend .env
        window.GOOGLE_CLIENT_ID = '725864767438-3bb48r2mf541gtbet8fnhnmg8tgjoqbm.apps.googleusercontent.com';
    </script>
    <script src="../config.js?v=2"></script>

    <script src="../api.js"></script>
    <script src="script.js"></script>
</body>

</html>
