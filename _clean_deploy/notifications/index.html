<!DOCTYPE html>

<head>
  <meta charset="utf-8"/>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='4' width='18' height='18' rx='4' fill='%237f0df2' opacity='.15'/><path d='M8 2v4M16 2v4M3 10h18' stroke='%237f0df2' stroke-width='2' stroke-linecap='round'/><circle cx='8' cy='15' r='1.5' fill='%237f0df2'/><circle cx='12' cy='15' r='1.5' fill='%237f0df2'/><circle cx='16' cy='15' r='1.5' fill='%237f0df2'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { background: var(--bg, #f4f4f8); }
    .notif-page { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
    .notif-page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; gap: 12px; flex-wrap: wrap; }
    .notif-page-title { font-size: clamp(22px,4vw,32px); font-weight: 800; color: var(--text-dark,#111); margin: 0; }
    .notif-unread-badge { background: #7f0df2; color: #fff; border-radius: 99px; padding: 3px 12px; font-size: 13px; font-weight: 600; }
    .notif-actions-bar { display: flex; gap: 8px; }
    .btn-mark-all { border: none; background: linear-gradient(135deg, #7f0df2, #5a09b3); color: #fff; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; box-shadow: 0 2px 10px rgba(127,13,242,.25); display: inline-flex; align-items: center; gap: 6px; }
    .btn-mark-all:hover { background: linear-gradient(135deg, #8b1dfa, #6c10c9); box-shadow: 0 4px 16px rgba(127,13,242,.4); transform: translateY(-1px); }
    .btn-mark-all:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(127,13,242,.25); }

    /* Notification card */
    .notif-card { background: #fff; border-radius: 14px; border: 1px solid #eee; margin-bottom: 10px; overflow: hidden; transition: box-shadow .2s; }
    .notif-card:hover { box-shadow: 0 4px 20px rgba(127,13,242,.08); }
    .notif-card.unread { border-left: 3px solid #7f0df2; }
    .notif-card-inner { display: flex; align-items: flex-start; gap: 14px; padding: 16px 20px; }
    .notif-icon-wrap { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .notif-icon-wrap.purple { background: #f0e6ff; color: #7f0df2; }
    .notif-icon-wrap.green { background: #dcfce7; color: #16a34a; }
    .notif-icon-wrap.orange { background: #fff7ed; color: #ea580c; }
    .notif-icon-wrap.blue { background: #eff6ff; color: #2563eb; }
    .notif-icon-wrap svg { width: 20px; height: 20px; }
    .notif-content { flex: 1; min-width: 0; }
    .notif-content-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .notif-msg { font-size: 14px; font-weight: 500; color: #1e293b; margin: 0 0 4px; line-height: 1.5; }
    .notif-card.read .notif-msg { color: #64748b; font-weight: 400; }
    .notif-time { font-size: 12px; color: #94a3b8; }
    .notif-unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #7f0df2; flex-shrink: 0; }
    .btn-notif-read { border: none; background: none; cursor: pointer; color: #94a3b8; padding: 4px; border-radius: 6px; transition: color .2s; }
    .btn-notif-read:hover { color: #7f0df2; }
    .btn-notif-read svg { width: 16px; height: 16px; }

    /* Empty / loading states */
    .notif-empty { text-align: center; padding: 60px 20px; color: #94a3b8; }
    .notif-empty-icon { font-size: 44px; margin-bottom: 12px; }
    .notif-empty h3 { font-size: 18px; font-weight: 600; color: #64748b; margin: 0 0 6px; }
    .notif-empty p { font-size: 14px; margin: 0; }
    .notif-spinner { display: flex; align-items: center; justify-content: center; padding: 48px; }
    .spinner-ring { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #7f0df2; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 9999; transform: translateY(20px); opacity: 0; transition: all .3s ease; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>

  <script>

  <script>
  (function() {
    'use strict';

    const list = document.getElementById('notifList');
    const unreadBadge = document.getElementById('unreadBadge');
    const markAllBtn = document.getElementById('markAllBtn');

    function timeAgo(isoStr) {
      const diff = Date.now() - new Date(isoStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    function iconForType(type) {
      const icons = {
        event: { cls: 'purple', svg: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke-width="2"/></svg>' },
        ticket: { cls: 'green', svg: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h14a2 2 0 012 2v2a2 2 0 000 4v2a2 2 0 01-2 2H5a2 2 0 01-2-2v-2a2 2 0 000-4V7z" stroke-width="2"/></svg>' },
        reminder: { cls: 'orange', svg: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-width="2"/></svg>' },
        info: { cls: 'blue', svg: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path d="M12 16v-4M12 8h.01" stroke-width="2"/></svg>' },
      };
      return icons[type] || icons.info;
    }

    function renderNotifications(notifications) {
      if (!notifications || notifications.length === 0) {
        list.innerHTML = `
          <div class="notif-empty">
            <div class="notif-empty-icon">🔔</div>
            <h3>All caught up!</h3>
            <p>No notifications yet. We'll let you know when something arrives.</p>
          </div>`;
        markAllBtn.style.background = '#e2e8f0';
        markAllBtn.style.color = '#94a3b8';
        markAllBtn.style.boxShadow = 'none';
        markAllBtn.style.pointerEvents = 'none';
        markAllBtn.style.cursor = 'default';
        return;
      }

      const unreadCount = notifications.filter(n => !n.read).length;

      if (unreadCount === 0) {
        markAllBtn.style.background = '#e2e8f0';
        markAllBtn.style.color = '#94a3b8';
        markAllBtn.style.boxShadow = 'none';
        markAllBtn.style.pointerEvents = 'none';
        markAllBtn.style.cursor = 'default';
      } else {
        markAllBtn.style.background = '';
        markAllBtn.style.color = '';
        markAllBtn.style.boxShadow = '';
        markAllBtn.style.pointerEvents = '';
        markAllBtn.style.cursor = '';
      }

      if (unreadCount > 0) {
        unreadBadge.textContent = unreadCount;
        unreadBadge.style.display = '';
      }

      list.innerHTML = notifications.map(n => {
        const icon = iconForType(n.type || 'info');
        const isUnread = !n.read;
        return `
          <div class="notif-card ${isUnread ? 'unread' : 'read'}" data-id="${n.id}">
            <div class="notif-card-inner">
              <div class="notif-icon-wrap ${icon.cls}">${icon.svg}</div>
              <div class="notif-content">
                <div class="notif-content-row">
                  <div style="display:flex;align-items:center;gap:8px">
                    ${isUnread ? '<span class="notif-unread-dot"></span>' : ''}
                    <p class="notif-msg">${n.message || 'New notification'}</p>
                  </div>
                  ${isUnread ? `<button class="btn-notif-read" data-id="${n.id}" title="Mark as read"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg></button>` : ''}
                </div>
                <span class="notif-time">${timeAgo(n.created_at)}</span>
              </div>
            </div>
          </div>`;
      }).join('');

      // Wire read buttons
      list.querySelectorAll('.btn-notif-read').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          try {
            await markNotificationRead(id);
            const card = list.querySelector(`[data-id="${id}"]`);
            if (card) {
              card.classList.remove('unread');
              card.classList.add('read');
              btn.remove();
              card.querySelector('.notif-unread-dot')?.remove();
            }
            const remaining = list.querySelectorAll('.notif-card.unread').length;
            if (remaining === 0) {
              unreadBadge.style.display = 'none';
              markAllBtn.style.background = '#e2e8f0';
              markAllBtn.style.color = '#94a3b8';
              markAllBtn.style.boxShadow = 'none';
              markAllBtn.style.pointerEvents = 'none';
              markAllBtn.style.cursor = 'default';
            } else {
              unreadBadge.textContent = remaining;
            }
          } catch(e) { showToast('Failed to mark as read'); }
        });
      });
    }

    async function loadNotifications() {
      try {
        const response = await fetchNotifications();
        // Backend returns { notifications: [...], total: N } or plain array
        const notifs = Array.isArray(response)
          ? response
          : (response.notifications || response.items || []);
        renderNotifications(notifs);
      } catch(err) {
        list.innerHTML = `
          <div class="notif-empty">
            <div class="notif-empty-icon">⚠️</div>
            <h3>Couldn't load notifications</h3>
            <p>${err.message || 'Please try again.'}</p>
          </div>`;
      }
    }

    markAllBtn.addEventListener('click', async () => {
      try {
        await markAllNotificationsRead();
        list.querySelectorAll('.notif-card.unread').forEach(card => {
          card.classList.remove('unread');
          card.classList.add('read');
          card.querySelector('.notif-unread-dot')?.remove();
          card.querySelector('.btn-notif-read')?.remove();
        });
        unreadBadge.style.display = 'none';
        markAllBtn.style.background = '#e2e8f0';
        markAllBtn.style.color = '#94a3b8';
        markAllBtn.style.boxShadow = 'none';
        markAllBtn.style.pointerEvents = 'none';
        markAllBtn.style.cursor = 'default';
        showToast('All notifications marked as read ✓');
      } catch(e) { showToast('Failed to mark all as read'); }
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadNotifications();
  })();
  </script>
  <script src="../navbar.js"></script>
</body>
