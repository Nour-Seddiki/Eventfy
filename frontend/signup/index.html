<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify - Create Your Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Left Side -->
        <div class="hero-section">
            <div class="hero-overlay"></div>
            <div class="logo">
                <div class="logo-icon">📅</div>
                <div class="logo-text">Eventify</div>
            </div>
            <div class="hero-content">
                <h2 class="hero-quote">"Join the community where events come to life."</h2>
            </div>
        </div>

        <!-- Right Side -->
        <div class="form-section">
            <div class="form-container">
                <div class="form-header">
                    <h1>Create Your Account</h1>
                    <p>Join Eventify to discover and host amazing events.</p>
                </div>

                <div id="errorMessage"
                    style="display:none; background:#fee2e2; color:#b91c1c; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:14px; font-weight:500;">
                </div>
                <div id="successMessage"
                    style="display:none; background:#dcfce7; color:#166534; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:14px; font-weight:500;">
                </div>

                <button class="google-btn" onclick="handleGoogleSignUp()">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Sign up with Google
                </button>

                <div class="divider">
                    <span>Or register with email</span>
                </div>

                <form id="signupForm" onsubmit="handleSubmit(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="signupUsername" placeholder="Choose a username"
                                required>
                            <span class="input-icon">👤</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" class="form-input" id="signupEmail" placeholder="name@example.com"
                                required>
                            <span class="input-icon">✉️</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="signupPassword"
                                placeholder="Create a password" required minlength="6">
                            <span class="input-icon">🔒</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="signupConfirmPassword"
                                placeholder="Confirm your password" required>
                            <span class="input-icon">🔒</span>
                        </div>
                    </div>

                    <div class="role-section">
                        <label class="role-label">I want to join as</label>
                        <div class="role-options">
                            <label class="role-card active" onclick="selectRole(this, 'attendee')">
                                <input type="radio" name="role" value="attendee" checked>
                                <div class="role-icon">🎫</div>
                                <div class="role-title">Attendee</div>
                                <div class="role-desc">Browse and register for events</div>
                            </label>
                            <label class="role-card" onclick="selectRole(this, 'organizer')">
                                <input type="radio" name="role" value="organizer">
                                <div class="role-icon">⚡</div>
                                <div class="role-title">Organizer</div>
                                <div class="role-desc">Create and manage your own events</div>
                            </label>
                        </div>
                    </div>

                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy
                                Policy</a></label>
                    </div>

                    <button type="submit" class="submit-btn" id="signupBtn">Register</button>
                </form>

                <div class="login-link">
                    Already have an account? <a href="../login/index.html">Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../api.js"></script>
    <script src="script.js"></script>
</body>

</html>
