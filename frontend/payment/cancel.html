<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled — Eventfy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f8fafc;
    }
    .card {
      background: #1e293b;
      border-radius: 24px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .icon-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .icon-wrap svg { width: 40px; height: 40px; color: #fff; }
    h1 {
      font-size: 28px; font-weight: 800;
      margin-bottom: 12px; color: #f59e0b;
    }
    .subtitle {
      font-size: 15px; color: #94a3b8;
      line-height: 1.6; margin-bottom: 32px;
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 14px 28px; border-radius: 12px; font-size: 14px;
      font-weight: 700; cursor: pointer; border: none;
      transition: all 0.2s; text-decoration: none; display: inline-flex;
      align-items: center; gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7f0df2, #a855f7);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(127,13,242,0.3); }
    .btn-secondary {
      background: #0f172a; color: #94a3b8;
      border: 1px solid #334155;
    }
    .btn-secondary:hover { color: #f8fafc; border-color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"/>
      </svg>
    </div>
    <h1>Payment Cancelled</h1>
    <p class="subtitle">
      No worries — your payment was not processed and you haven't been charged. 
      You can try again whenever you're ready.
    </p>
    <div class="actions">
      <a href="#" id="retryBtn" class="btn btn-primary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
        Try Again
      </a>
      <a href="../Events/index.html" class="btn btn-secondary">
        Browse Events →
      </a>
    </div>
  </div>

  <script>
    // If event_id is in the URL, link "Try Again" back to the event detail page
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get('event_id');
    const retryBtn = document.getElementById('retryBtn');
    if (eventId) {
      retryBtn.href = `../event Description/index.html?id=${eventId}`;
    } else {
      retryBtn.href = '../Events/index.html';
    }
  </script>
</body>
</html>
