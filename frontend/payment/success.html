<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — Eventfy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f8fafc;
    }
    .card {
      background: #1e293b;
      border-radius: 24px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .icon-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #34d399);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .icon-wrap svg { width: 40px; height: 40px; color: #fff; }
    h1 {
      font-size: 28px; font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #10b981, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 15px; color: #94a3b8;
      line-height: 1.6; margin-bottom: 32px;
    }
    .session-id {
      font-size: 12px; color: #475569;
      background: #0f172a; border-radius: 8px;
      padding: 10px 16px; margin-bottom: 24px;
      font-family: monospace; word-break: break-all;
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 14px 28px; border-radius: 12px; font-size: 14px;
      font-weight: 700; cursor: pointer; border: none;
      transition: all 0.2s; text-decoration: none; display: inline-flex;
      align-items: center; gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7f0df2, #a855f7);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(127,13,242,0.3); }
    .btn-secondary {
      background: #0f172a; color: #94a3b8;
      border: 1px solid #334155;
    }
    .btn-secondary:hover { color: #f8fafc; border-color: #475569; }
    .confetti { position: fixed; pointer-events: none; z-index: 9999; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"/>
      </svg>
    </div>
    <h1>Payment Successful!</h1>
    <p class="subtitle">
      Your ticket has been confirmed. You'll receive a confirmation email with your QR code shortly.
    </p>
    <div class="session-id" id="sessionInfo"></div>
    <div class="actions">
      <a href="../Events/index.html" class="btn btn-primary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
        Browse Events
      </a>
      <a href="../dashboard/index.html" class="btn btn-secondary">
        My Tickets →
      </a>
    </div>
  </div>

  <script>
    // Show session ID if present
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const infoEl = document.getElementById('sessionInfo');
    if (sessionId) {
      infoEl.textContent = 'Transaction: ' + sessionId.substring(0, 30) + '…';
    } else {
      infoEl.style.display = 'none';
    }

    // Simple confetti burst
    function createConfetti() {
      const colors = ['#10b981','#34d399','#7f0df2','#a855f7','#f59e0b','#ec4899'];
      for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: -10px;
          width: ${4 + Math.random() * 6}px;
          height: ${4 + Math.random() * 6}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
          animation: fall ${2 + Math.random() * 3}s linear forwards;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }
    }

    // Add fall animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(${Math.random() * 720}deg);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);
    createConfetti();
  </script>
</body>
</html>
