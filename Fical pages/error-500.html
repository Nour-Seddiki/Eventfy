<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 500 - Eventify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --primary-dark: #5b21b6;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --text-dark: #111827;
            --text-gray: #6b7280;
            --text-light: #9ca3af;
            --bg-white: #ffffff;
            --bg-light: #fafafa;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-dark);
            line-height: 1.6;
            background: var(--bg-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .navbar {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-dark);
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-gray);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-dark);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-light);
            border-color: var(--text-gray);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .btn-accent {
            background: var(--accent);
            color: white;
            padding: 0.875rem 1.75rem;
            border-radius: 50px;
            font-weight: 600;
        }

        .btn-accent:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dark);
            padding: 0.875rem 1.75rem;
            border-radius: 50px;
            font-weight: 500;
        }

        .btn-outline:hover {
            border-color: var(--text-gray);
            background: var(--bg-light);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Background Glow Effects */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

        .glow-1 {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -200px;
            left: -200px;
        }

        .glow-2 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            bottom: -150px;
            right: -150px;
            opacity: 0.1;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }

        /* Error Icon */
        .error-icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .error-icon {
            width: 140px;
            height: 140px;
            background: white;
            border-radius: 24px;
            box-shadow: 
                0 20px 60px rgba(124, 58, 237, 0.15),
                0 0 0 1px rgba(124, 58, 237, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        .error-icon::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1) 0%, rgba(245, 158, 11, 0.1) 100%);
            border-radius: 32px;
            z-index: -1;
            filter: blur(20px);
        }

        .error-icon-inner {
            font-size: 4rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 8px rgba(124, 58, 237, 0.2));
        }

        /* Decorative dots */
        .dot {
            position: absolute;
            border-radius: 50%;
            background: var(--primary-light);
            opacity: 0.3;
        }

        .dot-1 {
            width: 8px;
            height: 8px;
            top: 20px;
            left: -20px;
        }

        .dot-2 {
            width: 6px;
            height: 6px;
            top: 40px;
            right: -15px;
        }

        .dot-3 {
            width: 10px;
            height: 10px;
            bottom: 30px;
            left: -15px;
        }

        /* Error Badge */
        .error-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1.5rem;
            padding: 0.5rem 1rem;
            background: rgba(124, 58, 237, 0.08);
            border-radius: 50px;
        }

        .error-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* Error Text */
        .error-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: var(--text-dark);
            letter-spacing: -0.02em;
        }

        .error-description {
            font-size: 1.125rem;
            color: var(--text-gray);
            max-width: 450px;
            margin: 0 auto 2.5rem;
            line-height: 1.6;
        }

        /* Action Buttons */
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Footer */
        .footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        .footer-content {
            max-width: 1280px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .footer-links a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-copy {
            color: var(--text-light);
            font-size: 0.875rem;
        }

        /* Animations */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
        }

        .dot {
            animation: pulse 3s ease-in-out infinite;
        }

        .dot-1 { animation-delay: 0s; }
        .dot-2 { animation-delay: 1s; }
        .dot-3 { animation-delay: 2s; }

        /* Spin animation for refresh icon */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning {
            animation: spin 1s linear infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .error-title {
                font-size: 2.5rem;
            }

            .error-icon {
                width: 120px;
                height: 120px;
            }

            .error-icon-inner {
                font-size: 3rem;
            }

            .error-actions {
                flex-direction: column;
                align-items: center;
            }

            .btn-accent,
            .btn-outline {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">📅</div>
                <span>Eventify</span>
            </a>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="browse.html">Browse</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="how-it-works.html">How it Works</a></li>
            </ul>
            
            <div class="nav-actions">
                <a href="login.html" class="btn btn-ghost">Login</a>
                <a href="register.html" class="btn btn-primary">Register</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Background Glows -->
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        
        <div class="error-container">
            <!-- Error Icon -->
            <div class="error-icon-wrapper">
                <div class="dot dot-1"></div>
                <div class="dot dot-2"></div>
                <div class="dot dot-3"></div>
                <div class="error-icon">
                    <div class="error-icon-inner">⚠️</div>
                </div>
            </div>
            
            <!-- Error Badge -->
            <div class="error-badge">
                System Error 500
            </div>
            
            <!-- Error Title -->
            <h1 class="error-title">Something Went<br>Wrong</h1>
            
            <!-- Error Description -->
            <p class="error-description">
                We're experiencing a temporary issue. Our team is working to fix it.
            </p>
            
            <!-- Action Buttons -->
            <div class="error-actions">
                <button class="btn btn-accent" onclick="tryAgain(this)">
                    <span class="refresh-icon">↻</span>
                    Try Again
                </button>
                <a href="index.html" class="btn btn-outline">
                    <span>🏠</span>
                    Go to Homepage
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="#" onclick="showSupport(event)">
                    <span>💬</span>
                    Contact Support
                </a>
            </div>
            <div class="footer-copy">© 2026 Eventify. All rights reserved.</div>
        </div>
    </footer>

    <script>
        // Try Again functionality
        function tryAgain(btn) {
            const icon = btn.querySelector('.refresh-icon');
            icon.classList.add('spinning');
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';
            
            // Simulate retry attempt
            setTimeout(() => {
                icon.classList.remove('spinning');
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
                
                // Show notification
                showNotification('Attempting to reconnect...');
                
                // Simulate page reload or API retry
                setTimeout(() => {
                    // In real app, this would retry the failed request
                    // window.location.reload();
                }, 1000);
            }, 2000);
        }

        // Contact Support
        function showSupport(e) {
            e.preventDefault();
            showNotification('Support chat coming soon!');
        }

        // Notification system
        function showNotification(message) {
            // Remove existing notification
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%) translateY(20px);
                background: var(--text-dark);
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 12px;
                font-weight: 500;
                font-size: 0.9rem;
                z-index: 10000;
                opacity: 0;
                transition: all 0.3s ease;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // Animate in
            requestAnimationFrame(() => {
                notification.style.opacity = '1';
                notification.style.transform = 'translateX(-50%) translateY(0)';
            });
            
            // Remove after delay
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Add subtle parallax effect to icon on mouse move
        document.addEventListener('mousemove', (e) => {
            const icon = document.querySelector('.error-icon');
            const rect = icon.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const deltaX = (e.clientX - centerX) / 50;
            const deltaY = (e.clientY - centerY) / 50;
            
            icon.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
        });
    </script>
</body>
</html>
